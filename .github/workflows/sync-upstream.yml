name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    # Keep this fork aware of upstream changes without silently modifying main.
    - cron: "17 10 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    name: Open PR with upstream changes
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Forward-Future/loopy.git
          git fetch upstream main

      - name: Create sync branch
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B upstream-sync/main
          git merge --no-edit upstream/main
          git push --force-with-lease origin upstream-sync/main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or report sync PR
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh pr view upstream-sync/main --repo Ming-s-Agents/loopy >/dev/null 2>&1; then
            gh pr comment upstream-sync/main --repo Ming-s-Agents/loopy --body "Upstream sync branch refreshed from Forward-Future/loopy main."
          else
            gh pr create \
              --repo Ming-s-Agents/loopy \
              --base main \
              --head upstream-sync/main \
              --title "Sync upstream Forward-Future/loopy" \
              --body "This PR was opened by the scheduled upstream sync workflow. Review and merge to bring Ming-s-Agents/loopy up to date with Forward-Future/loopy."
          fi
